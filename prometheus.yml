global:
  scrape_interval: 10s

scrape_configs:
  - job_name: gateway
    metrics_path: /metrics
    static_configs:
      - targets: ['host.docker.internal:5000']
        labels: { service: 'Gateway' }

  - job_name: orders
    metrics_path: /metrics
    static_configs:
      - targets: ['host.docker.internal:5001']
        labels: { service: 'Orders' }

  - job_name: payments
    metrics_path: /metrics
    static_configs:
      - targets: ['host.docker.internal:5002']
        labels: { service: 'Payments' }

  - job_name: inventory
    metrics_path: /metrics
    static_configs:
      - targets: ['host.docker.internal:5003']
        labels: { service: 'Inventory' }

  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']
